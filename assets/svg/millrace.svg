<svg width="100%" viewBox="-8 40 933 215" role="img" xmlns="http://www.w3.org/2000/svg">
  <title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Millrace wordmark with water wheel</title>
  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">The word &quot;millrace&quot; with the letter M replaced by a spinning water wheel. The millrace follows the western arc outside the wheel, then runs horizontally past the wordmark.</desc>
  <defs>
    <!-- Accent: app.css (#38bdf8). Channel/arc: darker accent sky-800 (#075985). Hub dot: #0369a1 -->
    <mask id="imagine-text-gaps-kd530b" maskUnits="userSpaceOnUse"><rect x="-8" y="40" width="933" height="215" fill="white"/><rect x="218" y="77" width="662" height="163" fill="black" rx="2"/></mask>
  </defs>

  <!-- Channel behind wheel + text (paint order); opaque strokes so arc/bottom overlap doesn’t stack alpha -->
  <g id="millrace-channel" aria-hidden="true">
    <path d="M 146.574603 61 A 97 97 0 0 0 59.492269 234 L 872 234" fill="none" stroke="#075985" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(7, 89, 133);color:rgb(255, 255, 255);stroke-width:24px;stroke-linecap:round;stroke-linejoin:round;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <path d="M 146.574603 61 A 97 97 0 0 0 59.492269 234" fill="none" stroke="#075985" stroke-width="14" stroke-dasharray="12 6" stroke-linecap="round" style="fill:none;stroke:rgb(7, 89, 133);color:rgb(255, 255, 255);stroke-width:14px;stroke-dasharray:12px, 6px;stroke-linecap:round;stroke-linejoin:miter;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
    <line x1="59.492269" y1="234" x2="872" y2="234" stroke="#075985" stroke-width="14" stroke-dasharray="12 6" stroke-linecap="round" mask="url(#imagine-text-gaps-kd530b)" style="fill:none;stroke:rgb(7, 89, 133);color:rgb(255, 255, 255);stroke-width:14px;stroke-dasharray:12px, 6px;stroke-linecap:round;stroke-linejoin:miter;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  </g>

