; Column count snapshots for cumulative flow analysis.
;
; To reduce version control merge conflicts, each capture is stored as its own INI file
; under columns/{board-slug}/ (not appended here). Done columns are omitted from snapshots.
;
; Each snapshot file records column title, type, and open card count.

[columns]
; Comma-separated board slugs to snapshot. Empty = all boards listed in tasks/.millrace.ini.
boards =
