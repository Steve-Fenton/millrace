[board]
name = All Boards
slug = all-boards
kind = aggregate

; Aggregate boards include tasks from the listed source boards (by column type).
[sources.1]
slug = demo

[sources.2]
slug = project

; Columns appear in list order by section index (columns.1, columns.2, …).
[columns.1]
title = Options
type = options

[columns.2]
title = To do
type = to_do

[columns.3]
title = In progress
type = in_progress

[columns.4]
title = Waiting
type = waiting

[columns.5]
title = Done
type = done

; Swimlanes split the board horizontally (e.g. by team or stream).